<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Food Store Social Board</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script defer src="./render.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-side header-brand">
      <img src="./assets/logo.svg" alt="My Food Store logo" class="header-logo" />
      <span class="brand-name">My Food Store</span>
    </div>

    <div class="header-center">
      <div class="ratio-toggle" role="group" aria-label="Aspect ratio toggle">
        <button type="button" class="ratio-btn is-active" data-ratio="1:1" aria-pressed="true">1:1</button>
        <button type="button" class="ratio-btn" data-ratio="4:5" aria-pressed="false">4:5</button>
      </div>
    </div>

    <div class="header-side header-actions">
      <button type="button" id="downloadAllBtn" class="btn btn-primary">Download All</button>
    </div>
  </header>

  <main class="app-main">
    <section id="boardGrid" class="board-grid" aria-live="polite"></section>
  </main>

  <footer class="app-footer">
    <p>© 2026 My Food Store. All rights reserved.</p>
  </footer>
</body>
</html>
